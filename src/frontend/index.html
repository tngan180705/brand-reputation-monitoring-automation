<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highlands AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f3f4f6;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
        }
    </style>
</head>

<body class="flex flex-col md:flex-row">

    <!-- SIDEBAR -->
    <div class="hidden md:block w-64 bg-white h-screen border-r p-6">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-md border">
                <img
                    src="https://aeonmall-review-rikkei.cdn.vccloud.vn/public/wp/8/tenants/9A6u5ToJb0blHl62lEyIOayQrVdAI7vUv64EYvuj.png"
                    class="w-10 h-10 object-contain"
                    alt="Highlands logo"
                >
            </div>
            <div>
                <h1 class="text-lg font-bold">Highlands</h1>
                <p class="text-xs text-gray-400">AI Dashboard</p>
            </div>
        </div>

        <div class="space-y-3">
            <div class="bg-red-600 text-white p-3 rounded-xl">Bảng điều khiển</div>
            <div class="text-gray-500">Nhật ký AI Agent</div>
            <div class="text-gray-500">Dữ liệu thô</div>
            <div class="text-gray-500">Thông báo</div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="flex-1 p-4 md:p-8">

        <!-- HEADER -->
        <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-8">
            <div>
                <h2 class="text-xl md:text-2xl font-bold">Tổng quan danh tiếng thương hiệu</h2>
                <p class="text-gray-500 text-sm">Cập nhật dữ liệu thời gian thực</p>
            </div>

            <button onclick="fetchData()" class="bg-red-600 text-white px-5 py-2 rounded-xl w-full md:w-auto">
                Làm mới dữ liệu
            </button>
        </div>

        <!-- KPI -->
        <div id="kpi" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 mb-8"></div>

        <!-- CHART -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="card">
                <h3 class="text-gray-400 text-xs mb-4 uppercase text-center">Tỉ lệ cảm xúc</h3>
                <div class="flex justify-center items-center h-64 md:h-80">
                    <canvas id="pieChart" class="max-w-[250px] md:max-w-[280px]"></canvas>
                </div>
            </div>

            <div class="card">
                <h3 class="text-gray-400 text-xs mb-4 uppercase text-center">Dữ liệu theo nền tảng</h3>
                <div class="flex justify-center items-center h-64 md:h-80">
                    <canvas id="barChart" class="max-w-[300px] md:max-w-[350px]"></canvas>
                </div>
            </div>
        </div>

        <!-- TABLE -->
        <div class="card overflow-hidden">
            <div class="bg-gray-50 px-6 py-4 border-b">
                <h3 class="font-bold text-gray-700">Dữ liệu chi tiết gần đây</h3>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left min-w-[600px]">
                    <thead class="bg-gray-50 text-xs font-bold text-gray-500 uppercase">
                        <tr>
                            <th class="px-6 py-3">Nền tảng</th>
                            <th class="px-6 py-3">Người dùng</th>
                            <th class="px-6 py-3">Nội dung</th>
                            <th class="px-6 py-3">Cảm xúc</th>
                        </tr>
                    </thead>
                    <tbody id="data-table" class="text-sm divide-y"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let pieChart, barChart;

        async function fetchData() {
            try {
                const res = await fetch("http://localhost:5000/api/mentions");
                const data = await res.json();

                renderKPI(data);
                renderCharts(data);
                renderTable(data);
            } catch (error) {
                console.error("Lỗi tải dữ liệu:", error);
            }
        }

        function renderKPI(data) {
            const total = data.length;
            const pos = data.filter(d => d.sentiment === "positive").length;
            const neg = data.filter(d => d.sentiment === "negative").length;

            document.getElementById("kpi").innerHTML = `
                ${card("Tổng lượt nhắc", total, "text-black")}
                ${card("Tích cực", pos, "text-green-600")}
                ${card("Tiêu cực", neg, "text-red-600")}
            `;
        }

        function card(title, value, color) {
            return `
                <div class="card shadow-sm">
                    <p class="text-xs text-gray-400">${title}</p>
                    <h2 class="text-2xl md:text-3xl font-bold ${color}">${value}</h2>
                </div>
            `;
        }

        function renderTable(data) {
            const tbody = document.getElementById("data-table");

            const latest = [...data]
                .sort((a, b) => new Date(b.createdAt || Date.now()) - new Date(a.createdAt || Date.now()))
                .slice(0, 6);

            tbody.innerHTML = latest.map(item => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-3 font-bold text-blue-600 uppercase">${item.platform || "Khác"}</td>
                    <td class="px-6 py-3">${item.author || item.user || "Guest"}</td>
                    <td class="px-6 py-3 text-gray-600">${item.content || ""}</td>
                    <td class="px-6 py-3">
                        <span class="px-2 py-1 rounded text-xs font-bold ${
                            item.sentiment === "negative" ? "bg-red-100 text-red-600" :
                            item.sentiment === "positive" ? "bg-green-100 text-green-600" :
                            "bg-gray-100 text-gray-600"
                        }">
                            ${item.sentiment || "neutral"}
                        </span>
                    </td>
                </tr>
            `).join("");
        }

        function renderCharts(data) {
            const pos = data.filter(d => d.sentiment === "positive").length;
            const neg = data.filter(d => d.sentiment === "negative").length;
            const neu = data.length - pos - neg;

            if (pieChart) pieChart.destroy();
            pieChart = new Chart(document.getElementById("pieChart"), {
                type: "pie",
                data: {
                    labels: ["Tích cực", "Tiêu cực", "Trung lập"],
                    datasets: [{
                        data: [pos, neg, neu],
                        backgroundColor: ["#22c55e", "#ef4444", "#94a3b8"]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });

            const platformCounts = {};
            data.forEach(d => {
                const p = d.platform || "Khác";
                platformCounts[p] = (platformCounts[p] || 0) + 1;
            });

            if (barChart) barChart.destroy();
            barChart = new Chart(document.getElementById("barChart"), {
                type: "bar",
                data: {
                    labels: Object.keys(platformCounts),
                    datasets: [{
                        data: Object.values(platformCounts),
                        backgroundColor: "#B22830",
                        borderRadius: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        fetchData();
    </script>
</body>
</html>
