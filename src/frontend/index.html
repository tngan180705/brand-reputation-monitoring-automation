<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Highlands Reputation Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50">
    <div id="app" class="flex h-screen">
        <aside class="w-64 bg-red-800 text-white p-6" id="sidebar">
            <h1 class="text-2xl font-bold mb-10">Highlands AI</h1>
            <nav id="filters-container">
                </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-8">
            <div class="grid grid-cols-4 gap-4 mb-8" id="stats-summary">
                </div>

            <div class="grid grid-cols-2 gap-8 mb-8">
                <div class="bg-white p-4 rounded shadow">
                    <canvas id="sentimentChart"></canvas> </div>
                <div class="bg-white p-4 rounded shadow">
                    <canvas id="topicChart"></canvas> </div>
            </div>

            <div class="bg-white rounded shadow overflow-hidden">
                <table class="w-full">
                    <thead class="bg-gray-200">
                        <tr>
                            <th class="p-3">Nền tảng</th>
                            <th class="p-3">Người dùng</th>
                            <th class="p-3">Nội dung</th>
                            <th class="p-3">Cảm xúc</th>
                        </tr>
                    </thead>
                    <tbody id="main-table-body">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/filters.js"></script>
</body>
</html>
